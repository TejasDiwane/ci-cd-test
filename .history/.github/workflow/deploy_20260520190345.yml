name: Deploy on VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      -name: checkout code
       uses: actions/checkout@v3

      -name: set up SSH
       uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd test
            git pull origin main
            npm install
            npm run build
            pm2 restart server
             